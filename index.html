<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>八星等尊榮權益 - 皇家高雅閃耀版</title>
<style>
  /* =========================================
     高雅鵝黃華麗 UI ＋ 閃亮動態光澤設計
     ========================================= */
  :root {
    --primary-bg: #FFFCF2;      /* 溫暖象牙/極淺鵝黃底色 */
    --card-bg: #FFFFFF;         /* 純白卡片 */
    --gold-main: #D4A300;       /* 皇家琥珀金/深鵝黃 */
    --gold-light: #FFDF66;      /* 明亮鵝黃 */
    --text-main: #4A3F2A;       /* 優雅深棕灰文字 */
    --text-sub: #8C7B65;        /* 淺褐灰文字 */
    --accent-color: #FFF9D6;    /* 鵝黃點綴色 */
    --shadow: 0 10px 30px rgba(212, 163, 0, 0.1); 
  }
  
  body {
    background-color: var(--primary-bg); color: var(--text-main);
    font-family: 'Helvetica Neue', '微軟正黑體', Arial, sans-serif;
    margin: 0; padding: 0; display: flex; justify-content: center;
  }
  
  .app-container {
    width: 100%; max-width: 480px; background: var(--primary-bg);
    min-height: 100vh; position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.05); overflow-x: hidden;
  }

  /* 頂部 Header 閃耀字體 */
  .header {
    background: linear-gradient(135deg, #FFFFFF 0%, var(--accent-color) 100%);
    border-bottom: 3px solid var(--gold-main);
    padding: 35px 20px 20px; text-align: center; position: relative;
    overflow: hidden;
  }
  .shiny-text {
    margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(120deg, #B8860B 0%, #FFDF66 40%, #B8860B 80%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shineText 3s linear infinite;
    text-shadow: 0px 4px 10px rgba(212, 163, 0, 0.2);
  }
  @keyframes shineText { to { background-position: 200% center; } }
  .header p { margin: 8px 0 0 0; color: var(--text-sub); font-size: 13px; font-weight: bold; letter-spacing: 1px;}

  .page { display: none; padding: 20px; padding-bottom: 90px; }
  .page.active { display: block; animation: fadeUp 0.5s ease-out; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

  /* 搜尋列 */
  .search-box { 
    display: flex; margin-bottom: 25px; 
    box-shadow: 0 5px 15px rgba(212, 163, 0, 0.08); border-radius: 12px; background: #fff;
    position: relative; z-index: 2;
  }
  .search-box input {
    flex: 1; padding: 15px 18px; border-radius: 12px 0 0 12px;
    border: 1px solid #F0E6D2; border-right: none; background: transparent; color: var(--text-main); font-size: 15px;
  }
  .search-box input:focus { outline: none; border-color: var(--gold-main); }
  .search-box button {
    padding: 15px 22px; background: var(--gold-main); color: #fff; font-weight: bold; font-size: 15px; 
    border: none; border-radius: 0 12px 12px 0; cursor: pointer; transition: 0.3s;
  }
  .search-box button:hover { background: #B8860B; }

  .section-badge {
    display: inline-block; background: linear-gradient(90deg, #D4A300, #FFDF66); color: #5A4D31;
    padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 900; margin-bottom: 15px; box-shadow: 0 3px 10px rgba(212, 163, 0, 0.2);
  }
  .quick-title { color: var(--text-main); font-size: 16px; font-weight: 900; margin-bottom: 12px; display: flex; align-items: center;}
  .quick-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: var(--gold-main); margin-right: 8px; border-radius: 2px;}
  
  .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
  
  /* 閃耀按鈕設計 */
  .shiny-btn {
    background: var(--card-bg); border: 1px solid #F0E6D2; padding: 15px 8px; border-radius: 12px;
    text-align: center; color: var(--text-main); font-size: 13px; font-weight: bold; cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .shiny-btn::after {
    content: ''; position: absolute; top: -50%; left: -100%; width: 50%; height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
    transform: skewX(-25deg); animation: shimmerBtn 4s infinite;
  }
  @keyframes shimmerBtn { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
  .shiny-btn:active, .shiny-btn:hover { border-color: var(--gold-main); background: var(--accent-color); color: var(--gold-main); transform: translateY(-2px);}

  /* 卡片設計 - 鵝黃高雅 */
  .card {
    background: var(--card-bg); border-radius: 16px; padding: 22px; margin-bottom: 20px;
    border: 1px solid #F0E6D2; box-shadow: var(--shadow); border-top: 4px solid var(--gold-main);
  }
  .card-title { color: var(--gold-main); font-size: 18px; margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #F9F4E8; padding-bottom: 10px; font-weight: 900; line-height: 1.4;}
  .card-text { font-size: 14px; line-height: 1.8; color: #5A4D31; margin: 0; }
  .highlight { color: #5A4D31; font-weight: bold; background: var(--gold-light); padding: 2px 6px; border-radius: 4px; font-size: 13px;} 
  .tag { display: inline-block; background: var(--accent-color); color: #B8860B; padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 10px; margin-right: 6px;}
  
  ul, ol { padding-left: 20px; margin-top: 8px; margin-bottom: 8px;}
  li { margin-bottom: 8px; }
  .source-cite { font-size: 10px; color: #B0A392; vertical-align: super; margin-left: 2px;}

  /* 優雅表格 */
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; border-radius: 6px; overflow: hidden; border: 1px solid #F0E6D2;}
  th, td { border: 1px solid #F0E6D2; padding: 10px 8px; text-align: left; }
  th { background-color: var(--gold-main); color: #FFF; font-weight: bold; }
  tr:nth-child(even) { background-color: #FFFAF0; }

  .nav { 
    display: flex; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); position: fixed; bottom: 0; 
    width: 100%; max-width: 480px; border-top: 1px solid #F0E6D2; z-index: 100;
  }
  .nav button { flex: 1; padding: 18px 5px; background: transparent; color: var(--text-sub); border: none; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s;}
  .nav button.active { color: var(--gold-main); border-top: 3px solid var(--gold-main); background: #FFFCF2;}
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h1 class="shiny-text">八星等尊榮權益總覽</h1>
    <p>3W 核心精神 ｜ 家族智庫 ｜ 議價優勢</p>
  </div>

  <div id="page-home" class="page active">
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="輸入關鍵字搜尋...">
      <button onclick="performSearch()">搜尋</button>
    </div>
    
    <div id="quickNav">
      <!-- Category 1: 核心資格 -->

      <div class="quick-grid">
        <div class="shiny-btn" onclick="quickSearch('3W')">🌟 3W核心精神</div>

        <div class="shiny-btn" onclick="quickSearch('創世代')">💻 創世代知識網頁</div>

      <div class="section-badge">💰 大額議價與客製化</div>

      <div class="section-badge">💳 頂級信用卡與禮遇</div>
      <div class="quick-grid">
        <div class="shiny-btn" onclick="quickSearch('信用卡PK')">⚔️ 信用卡優勢 PK</div>
        <div class="shiny-btn" onclick="quickSearch('手續費')">💸 101次減免禮遇</div>

      </div>

      <!-- Category 5: 體驗與信託 -->
      <div class="section-badge">🎁 體驗與慈善信託</div>
      <div class="quick-grid">
        <div class="shiny-btn" onclick="quickSearch('生日禮')">🎂 尊榮生日禮二選一</div>
        <div class="shiny-btn" onclick="quickSearch('慈善信託')">🕊️ 慈善信託介紹</div>
      </div>
    </div>

    <div id="searchResult" style="display:none;"></div>
  </div>

  <div class="nav">
    <button class="tab-btn active" onclick="resetHome()">分類首頁</button>
    <button class="tab-btn" onclick="quickSearch('議價')">議價總覽</button>
    <button class="tab-btn" onclick="quickSearch('信用卡PK')">信用卡比較</button>
  </div>
</div>

<script>
  function resetHome() {
    document.getElementById('searchInput').value = '';
    document.getElementById('quickNav').style.display = 'block';
    document.getElementById('searchResult').style.display = 'none';
    window.scrollTo(0, 0);
  }

  function quickSearch(text) {
    document.getElementById('searchInput').value = text;
    performSearch();
  }

  // --- 高階分門別類 JSON 知識庫 ---
  const qaDatabase = [
    // === Category 1: 核心資格與精神 ===
    {
      keywords: ["3W", "核心精神", "八星等", "Wealth", "Well-being", "Welfare"],
      question: "八星等權益的三大核心精神 (3W) 是什麼？",
      answer: `
      <span class="tag">核心價值</span><br>
      我們希望以家族辦公室的宏觀思維，提供家族財富治理及傳承，實踐人生的幸福十樂，同時用慈善信託締造社會福祉[1]。三大核心為：<br>
      <ul>
        <li><span class="highlight">Wealth (財富)：</span>整合資源，進行家族資產與股權的全面盤點規劃[2]。</li>
        <li><span class="highlight">Well-being (幸福)：</span>攜手AI科技物理治療龍頭，提供專屬身心舒緩健康服務[2][3]。</li>
        <li><span class="highlight">Welfare (社會福祉)：</span>備有模組化慈善信託，幫客戶實現造福社會的公益善舉[2][3]。</li>
      </ul>`
    },
    {
      keywords: ["王品", "食尚私聚", "領取條件", "定存", "迎新"],
      question: "王品食尚私聚與台幣優利定存的領取條件為何？",
      answer: `
      <span class="tag">迎新禮遇</span><span class="tag">資格限制</span><br>
      要領取價值 3,000 元的「王品集團食尚私聚」以及「一年期 1.8% 台幣優惠定存」，主要條件如下：<br>
      1. <span class="highlight">八星等資產門檻：</span>AUM 需達新台幣 1 億元以上；或提供 AUM ≧ 1 億元之財力聲明書並檢附相關佐證。<br>
      2. <span class="highlight">期限與名額限制：</span>必須在 <b style="color:#D4A300">2026 年 3 月 31 日前</b> 申請，並且 <b style="color:#D4A300">僅限量前 50 位</b> 客戶。`
    },
    {
      keywords: ["財管2.0", "資格", "准入", "門檻"],
      question: "財管2.0 (高資產客戶) 的准入門檻與評估標準？",
      answer: `
      <span class="tag">資格認定</span><br>
      需具備 AUM ≧ 1億元之財力聲明與佐證。在專業評估上，需完成10題專業知識問卷(達8分以上)，並具備交易經驗(三擇一)：<br>
      1. 近2年申購達10次含2種商品。<br>
      2. 持有2筆相關商品達6個月以上。<br>
      3. 有2筆持有至到期之經驗。<br>
      本行會每年定期評估，每兩年辦理一次覆審。`
    },

    // === Category 2: 家族專屬智庫 ===
    {
      keywords: ["四大面向", "家辦", "家族辦公室", "智庫"],
      question: "家族辦公室專屬智庫的四大核心服務面向為何？",
      answer: `
      <span class="tag">家族智庫</span><span class="tag">外部專家</span><br>
      整合內部資源與外部會計師及律師（凱博聯合會計師/萬國律師事務所）為後盾[4]，提供四大服務：<br>
      1. <span class="highlight">財富策略與全球投資：</span>協助整體資產配置，掌握全球市場機會[5]。<br>
      2. <span class="highlight">家族治理與永續傳承：</span>設計家族憲法與家族會議機制，整理資產與家族價值共識[5]。<br>
      3. <span class="highlight">全球稅務與法律架構：</span>提供國內外稅務與信託規劃，因應CRS制度整合海內外資產[5]。<br>
      4. <span class="highlight">企業經營與成長顧問：</span>盤點企業資產與淨值，進行傳承與二代接班規劃[5]。`
    },
    {
      keywords: ["退場", "閉鎖性公司", "拋棄繼承", "防護"],
      question: "企業退場策略與「閉鎖性公司」如何防護家族資產？",
      answer: `
      <span class="tag">企業退場</span><span class="tag">股權控制</span><br>
      <ul>
        <li><span class="highlight">企業退場策略：</span>企業經營有風險，提醒企業主「保險+信託」是最佳防火牆。依民法規定，即便拋棄繼承，向保險公司請求給付保險金的權利不受影響，無須償還負債[5][6][7]。</li>
        <li><span class="highlight">閉鎖性公司三大好處：</span><br>
          (1) <b>防外人：</b>股東限50人且股權不可隨意買賣[6][7]。<br>
          (2) <b>掌控權：</b>透過「黃金特別股」1股換多票，持有少數股票仍有絕對話語權[6][7, 8]。<br>
          (3) <b>防任意出售：</b>利用一票否決權防止公司被惡意賣掉[6][8]。</li>
      </ul>`
    },
    {
      keywords: ["創世代", "知識網頁", "Family", "Firm", "Fortune"],
      question: "「創世代知識網頁」提供哪些專屬內容？",
      answer: `
      <span class="tag">專屬資訊</span><span class="tag">私密邀請制</span><br>
      遠銀獨創「創世代知識網頁」（密碼：<b style="color:#D4A300">feibwm</b>），採私密邀請制，每年3/6/9/12月定期更新，並由佘日新教授擔任駐站講師[6][9][8]。三大面向包含：<br>
      1. <span class="highlight">Family (代際傳承)：</span>家族溝通與二代接班觀點[6]。<br>
      2. <span class="highlight">Firm (趨勢洞察)：</span>家族企業結構問題、轉型趨勢與經營戰略[9]。<br>
      3. <span class="highlight">Fortune (品味生活)：</span>結合時尚潮流，提供趨勢與品味內容[9]。`
    },

    // === Category 3: 大額議價與客製化 ===
    {
      keywords: ["存款議價", "大額定存", "台幣議價", "美元加碼", "非美外幣"],
      question: "八星等台/外幣大額定存議價的優勢與流程為何？",
      answer: `
      <span class="tag">存款議價</span><span class="tag">專屬加碼</span><br>
      <ul>
        <li><span class="highlight">美元大額定存：</span>單筆達 USD 10萬元(含)以上，透過事業群主管(副總)權限上簽，各天期利率可獲 <b style="color:#D4A300">+5bps</b> 加碼[9][8]。</li>
        <li><span class="highlight">非美外幣定存：</span>若期望利率超過每日參考利率，可向產品開發部「資金管理組」詢問資金成本，並於資金成本範圍內上簽辦理，無法人/自然人限制[8]。</li>
        <li><span class="highlight">台幣大額定存：</span>依客戶資金需求，可專案上簽至 <b style="color:#D4A300">總經理權限</b>（需加會產品開發部、後會營管部）取得專屬優惠利率。</li>
      </ul>`
    },
    {
      keywords: ["授信議價", "質借", "房貸優勢", "擔保", "資金彈性"],
      question: "授信質借與尊榮房貸有哪些專屬議價與優惠？",
      answer: `
      <span class="tag">資金調度</span><span class="tag">利率減碼</span><br>
      <ul>
        <li><span class="highlight">特定金錢信託自行質借：</span>免收 3,000元開辦費，利率較一般 PI 客戶 <b style="color:#D4A300">再減碼 25bps</b>[10]。</li>
        <li><span class="highlight">外幣定存擔保台幣授信：</span>以外幣定存單為擔保，取得比照法金最低利率，8000萬內由副總權限優先審核[10]。</li>
        <li><span class="highlight">尊榮房貸優惠：</span>房貸利率較七星等客戶再低 5~10bps，<b style="color:#D4A300">全額減免 10,000元開辦費</b>，且享有優先審核與撥款禮遇[10]。</li>
      </ul>`
    },
    {
      keywords: ["客製投資", "嚴選債券", "私募", "手續費", "客製化商品"],
      question: "客製化投資組合與限量商品有什麼特色？",
      answer: `
      <span class="tag">投資商品</span><span class="tag">理財手續費</span><br>
      取得財管2.0資格後，遠銀將提供「限量」或「獨特性」的投資機會：<br>
      1. <span class="highlight">嚴選/限量標的：</span>提供限額私募基金，及不受信評限制的外國債券（如：新加坡航空債券、杜拜政府國際公債）[11][12, 13]。<br>
      2. <span class="highlight">客製化結構型商品：</span>可依客戶需求客製化股權或匯率結構型商品[11]。<br>
      3. <span class="highlight">申購手續費折扣：</span>單筆申購基金手續費享最低 <b style="color:#D4A300">3折起</b> 優惠[11][14]。`
    },

    // === Category 4: 信用卡與禮遇 ===
    {
      keywords: ["信用卡PK", "信用卡優勢", "頂級快樂卡", "星展", "台新", "永豐", "機場接送", "貴賓室"],
      question: "遠東頂級快樂卡與他行頂級卡(星展/台新/永豐)的優勢PK？",

  function performSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultDiv = document.getElementById('searchResult');
    const quickNav = document.getElementById('quickNav');
    
    if (!query) {
      resetHome();
      return;
    }

    quickNav.style.display = 'none';
    resultDiv.style.display = 'block';
    
    let foundHTML = '';
    
    qaDatabase.forEach(item => {
      const matchKeyword = item.keywords.some(kw => query.includes(kw.toLowerCase()) || kw.toLowerCase().includes(query));
      const matchText = item.question.toLowerCase().includes(query) || item.answer.toLowerCase().includes(query);
      
      if (matchKeyword || matchText) {
        foundHTML += `
          <div class="card">
            <h3 class="card-title">${item.question}</h3>
            <p class="card-text">${item.answer}</p>
          </div>
        `;
      }
    });

    if (foundHTML === '') {
      resultDiv.innerHTML = `
        <div class="card">
          <h3 class="card-title">🔍 查無相關資料</h3>
          <p class="card-text">您的查詢：「${query}」沒有對應的內容。請嘗試輸入「3W」、「議價」、「信用卡PK」或「生日禮」。</p>
        </div>`;
    } else {
      resultDiv.innerHTML = foundHTML;
    }
  }
