<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>八星等尊榮權益 - 清新閃耀版</title>
<style>
  /* =========================================
     清新高雅華麗 UI ＋ 閃亮動態光澤設計
     ========================================= */
  :root {
    --primary-bg: #F0F8F8;      /* 冰絲薄荷淺底 */
    --card-bg: #FFFFFF;         /* 珍珠白 */
    --gold-main: #C5A059;       /* 香檳金 */
    --gold-light: #E8D5A5;      /* 淺香檳金 */
    --text-main: #2C3E50;       /* 藏青灰 */
    --text-sub: #7F8C8D;        /* 淺灰 */
    --accent-color: #E0F2F1;    /* 清新點綴色 */
    --shadow: 0 10px 30px rgba(197, 160, 89, 0.15); 
  }
  
  body {
    background-color: var(--primary-bg); color: var(--text-main);
    font-family: 'Helvetica Neue', '微軟正黑體', Arial, sans-serif;
    margin: 0; padding: 0; display: flex; justify-content: center;
  }
  
  .app-container {
    width: 100%; max-width: 480px; background: var(--primary-bg);
    min-height: 100vh; position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.05); overflow-x: hidden;
  }

  /* 頂部 Header 閃耀字體 */
  .header {
    background: linear-gradient(135deg, #FFFFFF 0%, var(--accent-color) 100%);
    border-bottom: 3px solid var(--gold-main);
    padding: 35px 20px 20px; text-align: center; position: relative;
    overflow: hidden;
  }
  .shiny-text {
    margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(120deg, #C5A059 0%, #FFF8DC 40%, #C5A059 80%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shineText 3s linear infinite;
    text-shadow: 0px 4px 10px rgba(197, 160, 89, 0.2);
  }
  @keyframes shineText { to { background-position: 200% center; } }
  .header p { margin: 8px 0 0 0; color: var(--text-sub); font-size: 13px; font-weight: bold; letter-spacing: 1px;}

  .page { display: none; padding: 20px; padding-bottom: 90px; }
  .page.active { display: block; animation: fadeUp 0.5s ease-out; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

  /* 搜尋列 */
  .search-box { 
    display: flex; margin-bottom: 25px; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-radius: 12px; background: #fff;
    position: relative; z-index: 2;
  }
  .search-box input {
    flex: 1; padding: 16px; border-radius: 12px 0 0 12px;
    border: 1px solid #EAEAEA; border-right: none; background: transparent; color: var(--text-main); font-size: 15px;
  }
  .search-box input:focus { outline: none; border-color: var(--gold-main); }
  .search-box button {
    padding: 16px 22px; background: var(--gold-main); color: #fff; font-weight: bold; font-size: 15px; 
    border: none; border-radius: 0 12px 12px 0; cursor: pointer; transition: 0.3s;
  }

  .section-badge {
    display: inline-block; background: linear-gradient(90deg, #C5A059, #E8D5A5); color: #fff;
    padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(197,160,89,0.3);
  }
  .quick-title { color: var(--text-main); font-size: 16px; font-weight: 900; margin-bottom: 12px; display: flex; align-items: center;}
  .quick-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: var(--gold-main); margin-right: 8px; border-radius: 2px;}
  
  .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
  
  /* 閃耀按鈕設計 */
  .shiny-btn {
    background: var(--card-bg); border: 1px solid #F0F0F0; padding: 16px 8px; border-radius: 12px;
    text-align: center; color: var(--text-main); font-size: 14px; font-weight: bold; cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .shiny-btn::after {
    content: ''; position: absolute; top: -50%; left: -100%; width: 50%; height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
    transform: skewX(-25deg); animation: shimmerBtn 4s infinite;
  }
  @keyframes shimmerBtn { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
  .shiny-btn:active, .shiny-btn:hover { border-color: var(--gold-main); background: var(--accent-color); color: var(--gold-main); transform: translateY(-2px);}

  /* 卡片設計 */
  .card {
    background: var(--card-bg); border-radius: 16px; padding: 25px; margin-bottom: 22px;
    border: 1px solid #F0F0F0; box-shadow: var(--shadow); border-top: 4px solid var(--gold-main);
  }
  .card-title { color: var(--gold-main); font-size: 19px; margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #F4F4F4; padding-bottom: 12px; font-weight: 900;}
  .card-text { font-size: 15px; line-height: 1.8; color: #4A4A4A; margin: 0; }
  .highlight { color: #fff; font-weight: bold; background: var(--gold-main); padding: 2px 6px; border-radius: 4px; font-size: 14px;} 
  .tag { display: inline-block; background: var(--accent-color); color: var(--gold-main); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 12px; margin-right: 8px;}
  
  ul, ol { padding-left: 22px; margin-top: 8px; margin-bottom: 8px;}
  li { margin-bottom: 10px; }
  .source-cite { font-size: 11px; color: #AAB7B8; vertical-align: super; margin-left: 2px;}

  .nav { 
    display: flex; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); position: fixed; bottom: 0; 
    width: 100%; max-width: 480px; border-top: 1px solid #EAEAEA; z-index: 100;
  }
  .nav button { flex: 1; padding: 20px 5px; background: transparent; color: var(--text-sub); border: none; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s;}
  .nav button.active { color: var(--gold-main); border-top: 3px solid var(--gold-main); background: #FAFAFA;}
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h1 class="shiny-text">八星等極致智庫</h1>
    <p>財管2.0 ｜ 慈善信託 ｜ 家族傳承</p>
  </div>

  <div id="page-home" class="page active">
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="輸入關鍵字：財管2.0、流程、痛點...">
      <button onclick="performSearch()">搜尋</button>
    </div>
    
    <div id="quickNav">
      <div class="section-badge">✨ 核心業務全覽</div>
      <div class="quick-title">高資產客戶准入 (財管2.0)</div>
      <div class="quick-grid">
        <div class="shiny-btn" onclick="quickSearch('財管2.0')">👑 財管2.0完整資格</div>
        <div class="shiny-btn" onclick="quickSearch('專業評估')">📝 專業評估與經驗</div>
      </div>
      <div class="quick-title">慈善信託實務</div>
      <div class="quick-grid">
        <div class="shiny-btn" onclick="quickSearch('流程')">🔄 慈善信託五大流程</div>
        <div class="shiny-btn" onclick="quickSearch('痛點')">⛰️ 高資產公益痛點</div>
        <div class="shiny-btn" onclick="quickSearch('說故事')">🗣️ 話術與平台價值</div>
      </div>
      <div class="quick-title">家族辦公室整合</div>
      <div class="quick-grid">
        <div class="shiny-btn" onclick="quickSearch('傳承三張紙')">📄 傳承三張紙與接班</div>
        <div class="shiny-btn" onclick="quickSearch('防詐騙')">🛡️ 不動產與信託防護</div>
      </div>
    </div>

    <div id="searchResult" style="display:none;"></div>
  </div>

  <div class="nav">
    <button class="tab-btn active" onclick="resetHome()">回首頁</button>
    <button class="tab-btn" onclick="quickSearch('財管2.0')">財管2.0</button>
    <button class="tab-btn" onclick="quickSearch('流程')">信託SOP</button>
  </div>
</div>

<script>
  function resetHome() {
    document.getElementById('searchInput').value = '';
    document.getElementById('quickNav').style.display = 'block';
    document.getElementById('searchResult').style.display = 'none';
    window.scrollTo(0, 0);
  }

  function quickSearch(text) {
    document.getElementById('searchInput').value = text;
    performSearch();
  }

  // --- 全面擴充版 JSON 知識庫 ---
  const qaDatabase = [
    // --- 財管2.0 完整准入規範 (絕不偷工減料) ---
    {
      keywords: ["財管2.0", "資格", "准入", "門檻", "AUM", "高資產", "條件", "八星等", "專業評估", "交易經驗"],
      question: "高資產客戶 (財管2.0) 及八星等的資格與嚴格審查條件為何？",
      answer: `
      <span class="tag">資格認定</span><span class="tag">財管2.0</span><br>
      理專需確認自然人及法人客戶符合金管會規定之「高資產客戶」標準（如同具投資經驗的億級PI，不含不動產）。相關徵提與審查機制包含以下三大核心<span class="source-cite">[5-7]</span>：<br><br>
      <span class="highlight">一、財力證明 (二擇一)</span><br>
      1. 提供 <b style="color:#C5A059">1億元以上</b> 之可投資資產淨值（含保險商品價值）<span class="source-cite">[5, 7]</span>。<br>
      2. 於遠銀已有 3,000萬元以上，並提供「財力聲明書」聲明總資產達 1億元且檢附相關佐證（如前3個月內或最近一期）<span class="source-cite">[6-8]</span>。<br><br>
      <span class="highlight">二、專業評估 (知識+經驗)</span><br>
      1. <b>專業知識問卷：</b>共10題，每題1分，需達 <b style="color:#C5A059">8分(含)以上</b> 始符合資格<span class="source-cite">[7, 8]</span>。<br>
      2. <b>交易經驗 (三擇一)：</b><br>
         • 近2年內申購或轉換達 <b style="color:#C5A059">10次(含)以上</b>，且含2種以上不同商品<span class="source-cite">[7, 8]</span>。<br>
         • 近2年內持有2筆境內外結構/衍生性商品達 <b style="color:#C5A059">6個月以上</b><span class="source-cite">[7, 8]</span>。<br>
         • 近2年內有2筆境內外結構/衍生性商品 <b style="color:#C5A059">持有至到期</b> 之經驗<span class="source-cite">[7, 8]</span>。<br><br>
      <span class="highlight">三、審查與覆審機制</span><br>
      客戶須以「書面申請」。本行會 <b style="color:#C5A059">每年定期評估</b> 可投資資產價值，並 <b style="color:#C5A059">每兩年辦理一次覆審</b>。若客戶未配合審查（未提供文件或無法聯繫），將「暫停相關業務」並紀錄備查<span class="source-cite">[7, 9]</span>。`
    },
    // --- 慈善信託：流程與細節 ---
    {
      keywords: ["訂約流程", "辦理流程", "慈善信託的五步驟訂約流程", "SOP", "細節", "步驟"],
      question: "慈善信託的五步驟訂約流程與辦理細節為何？",
      answer: `
      <span class="tag">作業SOP</span><span class="tag">實務流程</span><br>
      慈善信託具備標準化作業，涵蓋以下五大核心步驟<span class="source-cite">[1-3]</span>：<br>
      <ol>
        <li><span class="highlight">簽訂契約與約定：</span>確認客戶需求（採「完全自益＋約定代為捐贈事務」架構），由客戶填寫申請書並簽訂制式化契約，約定定期捐款<span class="source-cite">[1]</span>。</li>
        <li><span class="highlight">交付信託財產：</span>分行辦理簽約後送信託部開立專戶。信託門檻為 <b style="color:#C5A059">新臺幣200萬</b>，期間至少5年。客戶匯入資金後，未來可隨時免收手續費追加財產<span class="source-cite">[1, 2]</span>。</li>
        <li><span class="highlight">管理與投資運用：</span>信託本金可依指示投資（如配置配息基金或海外債券，產生約5%孳息），以投資獲利作為永續捐款來源<span class="source-cite">[2, 3]</span>。</li>
        <li><span class="highlight">寄送信託報告：</span>為使客戶掌握資產，信託部會於每月15號前寄送紙本或電子的「信託財產月報告書」<span class="source-cite">[2, 3]</span>。</li>
        <li><span class="highlight">固定日捐款與交付收據：</span>依約定於每年固定日（指定 <b style="color:#C5A059">5/15 或 11/15</b>）匯款給嚴選公益機構（跨行手續費自信託扣取）。完成後由遠銀向機構索取收據正本，於 <b style="color:#C5A059">次年1月底前</b> 透過理專轉交客戶<span class="source-cite">[2, 3]</span>。</li>
      </ol>`
    },
    // --- 慈善信託：公益痛點 ---
    {
      keywords: ["公益挑戰", "高資產客戶面臨哪些具體的公益痛點", "痛點", "挑戰", "慈善"],
      question: "高資產客戶面臨哪些具體的公益痛點與挑戰？",
      answer: `
      <span class="tag">客戶痛點</span><span class="tag">永續傳承</span><br>
      高資產客戶在進行公益慈善時，常面臨以下五項真實挑戰<span class="source-cite">[4]</span>：<br>
      <ul>
        <li><span class="highlight">缺乏長期影響力：</span>多數慈善屬「一次性捐助」，無法支持長期的社會改變<span class="source-cite">[4]</span>。</li>
        <li><span class="highlight">資源不穩定：</span>教育與慈善公益機構缺乏穩定且可預期的資金來源<span class="source-cite">[4]</span>。</li>
        <li><span class="highlight">傳承困難：</span>個人的公益志業難以有系統地傳承給下一代<span class="source-cite">[4]</span>。</li>
        <li><span class="highlight">成效難以評估：</span>ESG (環境、社會與治理) 的成效難以量化與持續<span class="source-cite">[4]</span>。</li>
        <li><span class="highlight">管理耗時複雜：</span>若選擇自行成立基金會，管理十分複雜，將耗用大量時間與資源<span class="source-cite">[4]</span>。</li>
      </ul>`
    },
    // --- 慈善信託：推廣話術 ---
    {
      keywords: ["推廣策略", "說故事", "平台價值", "張先生"],
      question: "慈善信託的平台價值與「張先生」推廣說故事案例？",
      answer: `
      <span class="tag">實戰話術</span><br>
      平台價值在於<b>「把瞬間的善意，透過有制度的管理，化為永續的金流」</b>。我們不是捐錢，而是投資機構自立成長的能力<span class="source-cite">[4]</span>。<br><br>
      <b>【化推銷為分享的話術】</b><span class="source-cite">[10]</span><br>
      <i>「王董，最近我幫老客戶張先生完成了一件有意義的事。他多年來都把配息型基金的孳息直接捐出去做公益，完全不影響生活。但最近他越來越忙，擔心將來年紀大了誰來幫忙匯款？後來他把這筆資產放進『慈善信託』，銀行自動幫他投資、自動把孳息捐出去。<br>
      王董，我們不是在賣慈善信託，而是在幫您把最重視的愛心與志業，安穩地留下來。」</i>`
    },
    // --- 家族傳承：三張紙與接班 ---
    {
      keywords: ["傳承三張紙", "公司股權", "家族辦公室", "接班", "獨子", "多子女"],
      question: "家族辦公室如何規劃「傳承三張紙」及「獨子/多子女」接班差異？",
      answer: `
      <span class="tag">企業接班</span><span class="tag">閉鎖性公司</span><br>
      針對股權與動產分配，會依據「是否接班」分為兩大路徑<span class="source-cite">[11, 12]</span>：<br>
      • <span class="highlight">不接班 (只接家產)：</span>協助評估結束清算（含稅務評估）或進行股權出售退場。<br>
      • <span class="highlight">選擇接班：</span><br>
        1. <b>獨子接班：</b>因無爭產問題，重點在「移轉效率與風險控管」。規劃包含分年贈與、繼承買賣策略，並模擬關鍵股東過世的突發風險<span class="source-cite">[11, 13]</span>。<br>
        2. <b>多子女接班：</b>重點在「防範股權分散與內部衝突」。會進行「所有權與經營權」分離設計，強烈建議設立 <b style="color:#C5A059">閉鎖性公司</b> 並發行黃金特別股，利用「1股換多票」及一票否決權，防止公司被惡意出售<span class="source-cite">[11, 13]</span>。`
    },
    // --- 家族傳承：防詐與不動產 ---
    {
      keywords: ["防詐騙", "不動產保全", "詐騙", "不肖兒女", "保全"],
      question: "如何透過不動產保全規劃與信託防止不肖兒女或詐騙？",
      answer: `
      <span class="tag">地政防護</span><span class="tag">信託隔離</span><br>
      主要運用「地政業務」與「信託業務」建立雙重防護網：<br>
      1. <span class="highlight">全方位產權防護：</span>結合外部律師事務所，從產權登記最前端拉起防線，防範移轉風險<span class="source-cite">[12, 13]</span>。<br>
      2. <span class="highlight">信託資產隔離與專款專用：</span>設立「不動產信託」或「安養信託」，將資產隔離於個人名下風險之外。資金給付受契約嚴格規範，優先滿足安養需求，確保「專款專用」，直接剝奪不肖人士或詐騙集團隨意解約、挪用資產的機會<span class="source-cite">[12, 13]</span>。`
    }
  ];

  // --- 搜尋引擎邏輯 ---
  function performSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultDiv = document.getElementById('searchResult');
    const quickNav = document.getElementById('quickNav');
    
    if (!query) {
      resetHome();
      return;
    }

    quickNav.style.display = 'none';
    resultDiv.style.display = 'block';
    
    let foundHTML = '';
    
    qaDatabase.forEach(item => {
      const matchKeyword = item.keywords.some(kw => query.includes(kw.toLowerCase()) || kw.toLowerCase().includes(query));
      const matchText = item.question.toLowerCase().includes(query) || item.answer.toLowerCase().includes(query);
      
      if (matchKeyword || matchText) {
        foundHTML += `
          <div class="card">
            <h3 class="card-title">${item.question}</h3>
            <p class="card-text">${item.answer}</p>
          </div>
        `;
      }
    });

    if (foundHTML === '') {
      resultDiv.innerHTML = `
        <div class="card">
          <h3 class="card-title">🔍 查無相關資料</h3>
          <p class="card-text">您的查詢：「${query}」沒有對應的內容。請嘗試輸入「財管2.0」、「流程」或「痛點」。</p>
        </div>`;
    } else {
      resultDiv.innerHTML = foundHTML;
    }
  }
</script>

</body>
</html>
