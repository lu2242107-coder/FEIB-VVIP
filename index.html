<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>八星等尊榮權益 - 終極智庫版</title>
<style>
  /* =========================================
     華麗鑽石黃金閃耀 UI 設計 (簡潔優化版)
     ========================================= */
  :root {
    --gold-primary: #FFD700;
    --gold-dark: #DAA520;
    --diamond-glow: rgba(224, 255, 255, 0.6);
    --bg-dark: #080808;
    --card-bg: #151515;
  }
  
  body {
    background-color: var(--bg-dark); color: #f0f0f0;
    font-family: 'Helvetica Neue', '微軟正黑體', Arial, sans-serif;
    margin: 0; padding: 0; display: flex; justify-content: center;
  }
  
  .app-container {
    width: 100%; max-width: 480px; 
    background: linear-gradient(180deg, #111 0%, #000 100%);
    min-height: 100vh; position: relative;
    box-shadow: 0 0 30px var(--diamond-glow); overflow-x: hidden;
  }

  /* 頂部 Header 簡約奢華 */
  .header {
    background: linear-gradient(135deg, #1f1f1f 0%, #000 100%);
    border-bottom: 1px solid var(--gold-dark);
    padding: 30px 20px 20px; text-align: center; position: relative;
  }
  .sparkle-text {
    margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(90deg, #FFD700, #FFF8DC, #FFD700, #FFF8DC, #FFD700);
    background-size: 200% auto; color: #000;
    background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite; text-shadow: 0px 0px 5px rgba(255, 215, 0, 0.4);
  }
  @keyframes shine { to { background-position: 200% center; } }
  .header p { margin: 8px 0 0 0; color: #999; font-size: 13px; letter-spacing: 1px;}

  /* 內容區 */
  .page { display: none; padding: 20px; padding-bottom: 90px; }
  .page.active { display: block; animation: fadeUp 0.4s ease-out; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

  /* 搜尋列設計 - 加大觸控區 */
  .search-box { 
    display: flex; margin-bottom: 25px; 
    box-shadow: 0 5px 15px rgba(255, 215, 0, 0.15); border-radius: 10px;
  }
  .search-box input {
    flex: 1; padding: 18px 15px; border-radius: 10px 0 0 10px;
    border: 1px solid var(--gold-dark); background: #1a1a1a; color: #fff; font-size: 16px;
  }
  .search-box button {
    padding: 18px 25px; background: linear-gradient(135deg, #FFD700 0%, #DAA520 100%); 
    color: #000; font-weight: 900; font-size: 16px; border: none; border-radius: 0 10px 10px 0; cursor: pointer;
  }

  /* 快捷分類按鈕 (分類清晰不繁雜) */
  .quick-title { color: var(--gold-dark); font-size: 14px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;}
  .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
  .quick-btn {
    background: #111; border: 1px solid #444; padding: 14px 5px; border-radius: 8px;
    text-align: center; color: #e0e0e0; font-size: 14px; font-weight: bold; cursor: pointer;
    transition: all 0.3s;
  }
  .quick-btn:hover, .quick-btn:active { border-color: var(--gold-primary); color: var(--gold-primary); background: #222; }

  /* 資訊卡片 (結構化易讀) */
  .card {
    background: var(--card-bg); border-radius: 12px; padding: 22px; margin-bottom: 20px;
    border: 1px solid #333; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
  }
  .card::before {
    content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
    background: linear-gradient(135deg, #DAA520, transparent, transparent, #DAA520);
    z-index: -1; border-radius: 13px; opacity: 0.4;
  }
  .card-title { color: var(--gold-primary); font-size: 19px; margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 12px; line-height: 1.4;}
  .card-text { font-size: 15px; line-height: 1.8; color: #ccc; margin: 0; }
  .highlight { color: #fff; font-weight: bold; background: rgba(218, 165, 32, 0.2); padding: 0 4px; border-radius: 3px;} 
  .tag { display: inline-block; background: #222; border: 1px solid var(--gold-dark); color: var(--gold-primary); padding: 4px 10px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; margin-right: 6px;}
  ul { padding-left: 20px; margin-top: 10px; margin-bottom: 10px;}
  li { margin-bottom: 10px; }
  .source-cite { font-size: 12px; color: #888; vertical-align: super; }

  /* 底部導覽 */
  .nav { 
    display: flex; background: #0a0a0a; position: fixed; bottom: 0; 
    width: 100%; max-width: 480px; border-top: 1px solid #333; z-index: 100;
  }
  .nav button {
    flex: 1; padding: 18px 5px; background: transparent; color: #777;
    border: none; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s;
  }
  .nav button.active { 
    color: var(--gold-primary); border-top: 3px solid var(--gold-primary); background: rgba(255, 215, 0, 0.05);
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h1 class="sparkle-text">八星等智庫</h1>
    <p>輸入關鍵字，為您精準提取所需資訊</p>
  </div>

  <div id="page-home" class="page active">
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="例: 策略地圖、個人稅、地政、信託...">
      <button onclick="performSearch()">搜尋</button>
    </div>
    
    <!-- 首頁保持簡潔，透過清晰的模組按鈕引導 -->
    <div id="quickNav">
      <div class="quick-title">專屬智庫模組 (點擊快速查詢)</div>
      <div class="quick-grid">
        <div class="quick-btn" onclick="quickSearch('策略地圖')">🗺️ 資產規劃策略地圖</div>
        <div class="quick-btn" onclick="quickSearch('個人稅')">👤 個人稅業務與價值</div>
        <div class="quick-btn" onclick="quickSearch('地政')">🏢 地政業務與價值</div>
        <div class="quick-btn" onclick="quickSearch('信託業務')">🛡️ 信託業務與價值</div>
      </div>
      <div class="quick-title">實務作業與權益</div>
      <div class="quick-grid">
        <div class="quick-btn" onclick="quickSearch('財管2.0')">👑 財管 2.0 准入</div>
        <div class="quick-btn" onclick="quickSearch('慈善信託')">🕊️ 慈善信託架構</div>
        <div class="quick-btn" onclick="quickSearch('融資')">💰 資金活化與融資</div>
        <div class="quick-btn" onclick="quickSearch('生日禮')">🎁 權益與生日禮</div>
      </div>
    </div>

    <!-- 搜尋結果顯示區 -->
    <div id="searchResult" style="display:none;"></div>
  </div>

  <div class="nav">
    <button class="tab-btn active" onclick="resetHome()">回首頁分類</button>
    <button class="tab-btn" onclick="quickSearch('目標客戶')">目標客群</button>
    <button class="tab-btn" onclick="quickSearch('SOP')">通關SOP</button>
  </div>
</div>

<script>
  function resetHome() {
    document.getElementById('searchInput').value = '';
    document.getElementById('quickNav').style.display = 'block';
    document.getElementById('searchResult').style.display = 'none';
    window.scrollTo(0, 0);
  }

  function quickSearch(text) {
    document.getElementById('searchInput').value = text;
    performSearch();
  }

  // --- 完整且分類清晰的 JSON 知識庫 ---
  const qaDatabase = [
    {
      keywords: ["策略地圖", "家族辦公室", "功能介紹", "資產規劃", "四個", "企業服務", "傳承三張紙"],
      question: "家族辦公室功能介紹及資產規劃策略地圖為何？",
      answer: `
      <span class="tag">四大功能</span><span class="tag">策略地圖</span>
      遠銀家族辦公室提供四大維度的專業整合服務：<br>
      <ul>
        <li><span class="highlight">個人稅務(1/4)：</span>涵蓋雙重國籍、遺產贈與及海外所得，進行整體評估規劃<span class="source-cite">[1]</span>。</li>
        <li><span class="highlight">地政服務(2/4)：</span>結合稅務規劃與全方位產權登記，實現資產活化<span class="source-cite">[2, 3]</span>。</li>
        <li><span class="highlight">企業服務(3/4)：</span>聚焦股權接班、控制權安排及家族境內外資產整合<span class="source-cite">[4]</span>。</li>
        <li><span class="highlight">信託服務(4/4)：</span>提供安養、家族、股權及公益信託，達到多元化財富傳承<span class="source-cite">[5]</span>。</li>
      </ul>
      <b>【全資產規劃策略地圖】</b><br>
      策略地圖的邏輯為協助高資產客戶進行「資產重估」，並根據家庭狀況提供解決方案<span class="source-cite">[2]</span>：<br>
      1. <b>有無子女：</b>若無子女，聚焦投資退休現金流與信託；若有子女則進入「分配問題」<span class="source-cite">[2]</span>。<br>
      2. <b>分配問題（不動產與股權）：</b>針對不動產解決共有問題，針對公司股權解決「傳承三張紙」的問題。依據子女是否接班，規劃「股權出售」或「獨子/多子女接班」<span class="source-cite">[2]</span>。<br>
      3. <b>傳承意願：</b>若無意願，則分析各傳承工具優劣（如信託、保單規劃）；若有意願且已規劃個人稅務，則檢視境外資金匯回與分年贈與等細節<span class="source-cite">[2]</span>。`
    },
    {
      keywords: ["個人稅", "個人稅業務", "核心價值", "身分法", "親屬法"],
      question: "個人稅業務的「核心價值」與「服務內容」是什麼？",
      answer: `
      <span class="tag">個人稅業務</span><span class="tag">傳承家醫科</span><br>
      <b>【核心價值】</b><br>
      客戶所有的資產與規劃（包含動產、不動產、公司股權或信託），最終都必須回歸到「個人」為主體<span class="source-cite">[1]</span>。整體的規劃不僅牽涉財產法，更關乎於「身分法」<span class="source-cite">[1]</span>。個人稅規劃結合各領域專家，如同擔任客戶家族傳承的「家醫科」，先做全盤了解把關<span class="source-cite">[1]</span>。<br>
      <br><b>【服務內容】</b><br>
      <ul>
        <li><span class="highlight">傳承法規與分配：</span>涵蓋親屬法與繼承法，結合完整性與永續性的心願，讓傳承符合民法並友善分配<span class="source-cite">[1]</span>。</li>
        <li><span class="highlight">稅務規劃諮詢：</span>分析不同傳承工具的優缺點，降低傳承成本<span class="source-cite">[2]</span>。</li>
        <li><span class="highlight">市值與傳承價值評估：</span>結合會計師針對不動產與公司價值進行重估<span class="source-cite">[2]</span>。</li>
      </ul>`
    },
    {
      keywords: ["地政", "地政業務", "不動產", "產權", "活化", "保全"],
      question: "地政業務的「功能價值」與「服務內容」是什麼？",
      answer: `
      <span class="tag">地政業務</span><span class="tag">資產活化</span><br>
      <b>【功能價值】</b><br>
      旨在強化億級以上客戶針對「不動產活化」以及「不動產傳承規劃」的動機，確保客戶在不動產稅務與資產活化兩方面皆能兼顧，提升整體的財富管理認知<span class="source-cite">[3]</span>。<br>
      <br><b>【服務內容】</b><br>
      <ul>
        <li><span class="highlight">資產市值重估：</span>提供億級客戶完成不動產資產重估及活化規劃<span class="source-cite">[3]</span>。</li>
        <li><span class="highlight">客製化移轉規劃：</span>提供生前規劃、遺產分配等稅負規劃，結合律師達成合規傳承<span class="source-cite">[2, 3]</span>。</li>
        <li><span class="highlight">不動產保全規劃：</span>協助客戶防止不肖兒女或詐騙，穩固資產安全<span class="source-cite">[3]</span>。</li>
        <li><span class="highlight">稅務規劃諮詢：</span>涵蓋售屋所得、重購退稅、遺贈稅等，最大化財富效益<span class="source-cite">[2, 3]</span>。</li>
      </ul>`
    },
    {
      keywords: ["信託", "信託業務", "核心價值", "安養照護", "專款專用"],
      question: "信託業務的「核心價值」與「服務內容」是什麼？",
      answer: `
      <span class="tag">信託業務</span><span class="tag">家族治理</span><br>
      <b>【核心價值】</b><br>
      信託議題提供超越一般理財的深度服務<span class="source-cite">[5]</span>。透過信託機制，為客戶實現「財富傳承」、「資產保護」與「家族治理」的多元化需求，確保資產能穩健增長並順利進行世代傳承<span class="source-cite">[5]</span>。<br>
      <br><b>【服務內容】</b><br>
      <ul>
        <li><span class="highlight">安養照護規劃：</span>優先規劃客戶自身的安養需求，確保生活照護及醫療資金能專款專用，弱勢照護自動給付<span class="source-cite">[6]</span>。</li>
        <li><span class="highlight">客製化信託規劃：</span>依據個別目標量身打造專屬信託契約<span class="source-cite">[6]</span>。</li>
        <li><span class="highlight">資產評估與稅務：</span>全面盤點資產價值，並提供合法節稅建議以降低傳承成本<span class="source-cite">[6]</span>。</li>
      </ul>`
    },
    {
      keywords: ["目標客戶", "客群", "誰是", "找誰", "痛點"],
      question: "誰是我們的目標客戶？他們面臨哪些痛點？",
      answer: `
      <span class="tag">目標客群</span><br>
      核心目標聚焦於「金字塔頂端客群」及「面臨接班挑戰的企業」<span class="source-cite">[7]</span>：<br>
      1. <span class="highlight">股權高度集中的企業主：</span>大於60歲、未上市櫃持股集中、二代無實質股權，缺乏接班共識<span class="source-cite">[7]</span>。<br>
      2. <span class="highlight">稅務與風險偏高的企業家：</span>高累積盈餘、股東資金混用、曾被查稅、預計增減資<span class="source-cite">[7]</span>。<br>
      3. <span class="highlight">境內外資產眾多的家族：</span>擁有境外公司/海外帳戶、擔心CFC/CRS及跨境繼承風險<span class="source-cite">[7]</span>。`
    },
    {
      keywords: ["財管2.0", "資格", "准入", "門檻", "AUM", "條件", "八星等"],
      question: "高資產客戶 (財管2.0) 及八星等的資格與條件為何？",
      answer: `
      <span class="tag">資格認定</span><br>
      客戶須提供 AUM ≧ 1 億元之財力聲明書並檢附相關佐證。在專業評估上，需完成10題專業知識問卷(達8分以上)，並具備交易經驗（如近2年申購達10次含2種商品，或持有滿6個月/至到期）。本行每年評估，每兩年覆審一次。`
    },
    {
      keywords: ["慈善信託", "公益", "捐款", "稅", "門檻"],
      question: "遠銀慈善信託的運作架構為何？",
      answer: `
      <span class="tag">社會福祉</span><br>
      門檻新臺幣200萬元，採「完全自益信託」架構。核心為「本金不動用」，投資孳息於每年 5/15 與 11/15 定期捐贈給客戶指定的6大公益機構（如江賢二藝術、均一教育等）。具備捐款次年抵稅效益，跨行匯款手續費自信託專戶扣除。`
    },
    {
      keywords: ["融資", "活化", "質借", "保費", "保單", "定存議價"],
      question: "資金活化(融資/質借)與大額定存有何優惠？",
      answer: `
      <span class="tag">資金彈性</span><br>
      • <b>保單融資/保費融資：</b>活化既有保單或槓桿購買新契約。<br>
      • <b>特定金錢信託自行質借：</b>免收3000元開辦費，利率較一般 PI 減碼 25bps。<br>
      • <b>大額定存議價：</b>美元定存透過事業群主管權限可加碼 +5bps；非美元外幣依每日參考利率與資金成本上簽辦理。`
    },
    {
      keywords: ["SOP", "手續費", "跨提", "匯出", "信用卡", "綠色通道", "生日禮"],
      question: "八星等日常金融禮遇與通關 SOP 為何？",
      answer: `
      <span class="tag">專屬禮遇</span><br>
      • <b>免手續費：</b>每月 101 次 ATM 跨提、101 次自動化跨轉、101 次臨櫃指定交易(含外幣匯出9次，不含全額到付)。<br>
      • <b>客服直通：</b>打客服輸入身分證 ID，系統自動辨識直轉專員。<br>
      • <b>生日禮：</b>AVEDA 療程或生生優動 VIP 陪伴(二選一)，90天期限可轉贈，理專須於當月15號前回覆。`
    }
  ];

  // --- 搜尋邏輯 ---
  function performSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultDiv = document.getElementById('searchResult');
    const quickNav = document.getElementById('quickNav');
    
    if (!query) {
      resetHome();
      return;
    }

    quickNav.style.display = 'none';
    resultDiv.style.display = 'block';
    
    let foundHTML = '';
    
    qaDatabase.forEach(item => {
      const matchKeyword = item.keywords.some(kw => query.includes(kw.toLowerCase()) || kw.toLowerCase().includes(query));
      const matchText = item.question.toLowerCase().includes(query) || item.answer.toLowerCase().includes(query);
      
      if (matchKeyword || matchText) {
        foundHTML += `
          <div class="card">
            <h3 class="card-title">💎 ${item.question}</h3>
            <p class="card-text">${item.answer}</p>
          </div>
        `;
      }
    });

    if (foundHTML === '') {
      resultDiv.innerHTML = `
        <div class="card">
          <h3 class="card-title">🔍 查無完全符合資料</h3>
          <p class="card-text">您的查詢：「${query}」目前沒有對應的內容。請嘗試使用快捷鍵或更簡短的關鍵字。</p>
        </div>`;
    } else {
      resultDiv.innerHTML = foundHTML;
    }
  }
</script>

</body>
</html>
